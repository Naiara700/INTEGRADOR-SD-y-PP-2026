name: 2 - Build & Push Images

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Imagen a buildear (all | nct | trp | worker | frontend)'
        required: true
        default: 'all'
  push:
    branches:
      - main
    paths:
      - 'Pilar2/**'
      - 'Pilar3/apps/**'
      - 'frontend/**'
      - 'Hit7/**'
      - 'include/**'

env:
  PROJECT_ID: project-f3583ede-db03-4872-95c
  PROJECT_NUMBER: '262741693052'
  REGISTRY: us-central1-docker.pkg.dev
  REPO: stickerchain
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  # ------------------------------------------------------------------
  # Build de imágenes CPU (nct, trp, frontend) — Linux amd64 estándar
  # ------------------------------------------------------------------
  build-cpu:
    name: Build CPU Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Requerido para Workload Identity Federation

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sticker-nct
            dockerfile: Pilar3/apps/Dockerfile.nct
            context: .
          - name: sticker-trp
            dockerfile: Pilar3/apps/Dockerfile.trp
            context: .
          - name: sticker-frontend
            dockerfile: frontend/Dockerfile
            context: frontend
          - name: sticker-worker-cpu
            dockerfile: Pilar3/apps/Dockerfile.worker-cpu
            context: .
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Sin claves estáticas: autenticación vía Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # Build de imagen GPU (worker Hit7) — requiere cross-compile amd64
  # ------------------------------------------------------------------
  build-gpu:
    name: Build GPU Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push sticker-hit7 (GPU Worker)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Pilar3/apps/Dockerfile.worker
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/sticker-hit7:latest
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/sticker-hit7:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
