name: 2 - Deploy Base Services

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  CLUSTER_NAME: stickerchain-cluster
  ZONE: us-central1-a
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  deploy-services:
    name: Deploy Redis and RabbitMQ to GKE
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Requerido para Workload Identity

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Zero static keys: autenticación vía Workload Identity
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials
        run: gcloud container clusters get-credentials $CLUSTER_NAME --zone $ZONE --project $PROJECT_ID

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Add Bitnami Repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Deploy Redis
        run: |
          helm upgrade --install redis bitnami/redis \
            --set architecture=standalone \
            --set auth.enabled=false \
            --set nodeSelector.node_role=infrastructure \
            --wait

      - name: Deploy RabbitMQ
        run: |
          helm upgrade --install rabbitmq bitnami/rabbitmq \
            --set auth.username=guest \
            --set auth.password=guest \
            --set nodeSelector.node_role=infrastructure \
            --wait
