apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stickerchain-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nct-service
                port:
                  number: 8000
          - path: /bully
            pathType: Prefix
            backend:
              service:
                name: nct-service
                port:
                  number: 8000