apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stickerchain-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - stickerchain.lat
    - api.stickerchain.lat
    secretName: stickerchain-tls-secret
  rules:
  # ==========================================
  # 1. FRONTEND: El usuario entra a la web visual
  # ==========================================
  - host: stickerchain.lat
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

  # ==========================================
  # 2. BACKEND: La aplicación consume los datos
  # ==========================================
  - host: api.stickerchain.lat
    http:
      paths:
      # Todo lo que vaya a api.stickerchain.lat/* va al Backend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nct-service
            port:
              number: 8000