apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nct-statefulset
  namespace: default
  labels:
    app: nct
spec:
  serviceName: "nct-headless"
  replicas: 3
  selector:
    matchLabels:
      app: nct
  template:
    metadata:
      labels:
        app: nct
    spec:
      nodeSelector:
        node_role: applications
      containers:
      - name: nct
        image: us-central1-docker.pkg.dev/project-f3583ede-db03-4872-95c/stickerchain/sticker-nct:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: PORT
          value: "8000"
        - name: REDIS_HOST
          value: "redis-service"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: TRP_SERVICE_URL
          value: "http://trp-service:8001"
        - name: PEERS
          value: "nct-statefulset-0.nct-headless:8000,nct-statefulset-1.nct-headless:8000,nct-statefulset-2.nct-headless:8000"
        livenessProbe:
          httpGet:
            path: /bully/heartbeat
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /bully/heartbeat
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nct-headless
  namespace: default
spec:
  clusterIP: None
  selector:
    app: nct
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: nct-service
  namespace: default
spec:
  selector:
    app: nct
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
