apiVersion: apps/v1
kind: Deployment
metadata:
  name: nct-deployment
  namespace: default
  labels:
    app: nct
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nct
  template:
    metadata:
      labels:
        app: nct
    spec:
      nodeSelector:
        node_role: applications
      containers:
      - name: nct
        image: gcr.io/stickerchain-project/nct:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: PORT
          value: "8000"
        - name: REDIS_HOST
          value: "redis-service"
        - name: RABBITMQ_HOST
          value: "rabbitmq-service"
        - name: TRP_SERVICE_URL
          value: "http://trp-service"
---
apiVersion: v1
kind: Service
metadata:
  name: nct-service
  namespace: default
spec:
  selector:
    app: nct
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
