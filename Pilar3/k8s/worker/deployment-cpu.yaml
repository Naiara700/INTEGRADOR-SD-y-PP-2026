apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-cpu-deployment
  namespace: default
  labels:
    app: worker-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-cpu
  template:
    metadata:
      labels:
        app: worker-cpu
    spec:
      containers:
      - name: worker-cpu
        image: us-central1-docker.pkg.dev/project-f3583ede-db03-4872-95c/stickerchain/sticker-worker-cpu:latest
        imagePullPolicy: Always
        # Armamos la URL dinámicamente en tiempo de ejecución para no exponer contraseñas en Git
        command: ["/bin/sh", "-c"]
        args:
          - |
            export RABBITMQ_URL="amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq-service:5672"
            exec python Pilar3/worker_miner_cpu.py
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1500m"
            memory: "2Gi"
        env:
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: username
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: password
