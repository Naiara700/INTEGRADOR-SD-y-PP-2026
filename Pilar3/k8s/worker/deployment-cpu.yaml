apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-cpu-deployment
  namespace: default
  labels:
    app: worker-cpu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-cpu
  template:
    metadata:
      labels:
        app: worker-cpu
    spec:
      containers:
      - name: worker-cpu
        image: naiaracollazo/sticker-worker-miner:latest
        imagePullPolicy: Always
        command: ["python", "Pilar3/worker_miner_cpu.py"]
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        env:
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: username
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-secret
              key: password
        - name: RABBITMQ_URL
          value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq-service:5672"
