apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: default
  labels:
    app: rabbitmq
data:
  # rabbitmq.conf: configura el broker.
  # SIN load_definitions — las credenciales vienen de RABBITMQ_DEFAULT_USER/PASS
  # inyectadas como env vars desde el Secret 'rabbitmq-secret' en el StatefulSet.
  rabbitmq.conf: |
    loopback_users.guest = false
